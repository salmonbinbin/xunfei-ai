version: '3.8'

services:
  # MySQL数据库
  db:
    image: mysql:8.0
    container_name: ai_xiaoshang_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password_change_me
      MYSQL_DATABASE: ai_xiaoshang
      MYSQL_USER: ai_user
      MYSQL_PASSWORD: ai_password_change_me
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    networks:
      - ai_xiaoshang
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端API服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_xiaoshang_backend
    environment:
      - DATABASE_URL=mysql+aiomysql://ai_user:ai_password_change_me@db:3306/ai_xiaoshang
      - XFYUN_APP_ID=${XFYUN_APP_ID}
      - XFYUN_API_KEY=${XFYUN_API_KEY}
      - XFYUN_API_SECRET=${XFYUN_API_SECRET}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=10080
      - UPLOAD_DIR=/app/uploads
      - MAX_AUDIO_SIZE_MB=50
      - MAX_IMAGE_SIZE_MB=5
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ai_xiaoshang
    restart: unless-stopped
    volumes:
      - ./uploads:/app/uploads
      - ./data/chroma_db:/app/data/chroma_db

  # 前端Nginx服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_xiaoshang_frontend
    depends_on:
      - backend
    networks:
      - ai_xiaoshang
    restart: unless-stopped

networks:
  ai_xiaoshang:
    driver: bridge

volumes:
  mysql_data:
