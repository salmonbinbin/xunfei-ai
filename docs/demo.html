<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI小商 · 智慧校园助手</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
      background: #FAFAFA;
      color: #111;
      -webkit-font-smoothing: antialiased;
    }
    #root { min-height: 100vh; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-16px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .fade-up { animation: fadeUp 0.5s ease-out forwards; }
    .slide-in { animation: slideIn 0.4s ease-out forwards; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // ============================================================
    // Design Tokens — 新方向：克制学院感 + 报纸排版美学
    // ============================================================
    const t = {
      ink: '#1A1A1A',
      inkLight: '#4A4A4A',
      inkFaint: '#8A8A8A',
      inkFainter: '#BABABA',
      paper: '#FAFAF8',
      card: '#FFFFFF',
      rule: '#E8E8E4',
      primary: '#1B4D5C',
      primaryLight: '#2A6B7C',
      accent: '#C4623A',
      success: '#3D6B4F',
      muted: '#F2F0EC',
    };

    // ============================================================
    // Mock Data
    // ============================================================
    const mockUser = {
      nickname: '林同学',
      major: '经济管理学院',
      grade: 2,
      goal: '考研',
    };

    const todayCourses = [
      { name: '高等数学', room: '教学楼A301', time: '08:00 – 09:40', teacher: '张教授', color: t.primary },
      { name: '微观经济学', room: '教学楼B205', time: '10:00 – 11:40', teacher: '李副教授', color: t.accent },
      { name: '大学英语', room: '外语楼102', time: '14:00 – 15:40', teacher: '王老师', color: t.success },
    ];

    const schedules = [
      { title: '班会', time: '周二 14:00 · 教学楼9-301', icon: '📋' },
      { title: '导师见面', time: '周三 16:00 · 学院楼302', icon: '🤝' },
    ];

    const recentActivities = [
      { type: 'review', title: '第三章：极限与连续', subtitle: '课程录音 · 45分钟', time: '2小时前', color: t.primary },
      { type: 'chat', title: '如何准备期末考试', subtitle: 'AI学姐 · 8条消息', time: '昨天', color: t.accent },
      { type: 'schedule', title: '班会', subtitle: '周二 14:00 · 教学楼9-301', time: '昨天', color: t.success },
    ];

    const chatMessages = [
      { role: 'user', text: '学姐，期末考试的高数重点有哪些？' },
      { role: 'ai', text: '林同学你好！根据历年期末试卷分析，极限与连续、导数与微分、不定积分是三大核心板块。建议重点复习教材第三章到第五章，尤其是课后习题的典型题型。我这里整理了一份重点清单要发给你吗？' },
      { role: 'user', text: '好的，麻烦学姐了！' },
      { role: 'ai', text: '已发送给你啦。里面有每个章节的核心考点和常考题型归纳。另外下周三下午有张教授的答疑时间，记得来参加。对了，最近天气转凉，多穿点哦。' },
    ];

    const statsData = [
      { label: '我的课程', value: '8', sub: '已导入' },
      { label: '录音回顾', value: '5', sub: '已完成' },
      { label: 'AI对话', value: '23', sub: '次会话' },
      { label: '日程', value: '12', sub: '条记录' },
    ];

    const navItems = [
      { key: 'home', label: '首页', icon: 'home' },
      { key: 'ai', label: 'AI学姐', icon: 'chat' },
      { key: 'translate', label: '翻译', icon: 'translate' },
      { key: 'activity', label: '活动助手', icon: 'activity' },
      { key: 'course', label: '选课助手', icon: 'course' },
    ];

    const icons = {
      home: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>,
      chat: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>,
      translate: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M5 8l4 8M9 8l-4 8M13 8l4 8M17 8l-4 8M1 4h22M1 20h22"/></svg>,
      activity: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><circle cx="12" cy="15" r="2"/></svg>,
      course: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>,
      send: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>,
      mic: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>,
    };

    // ============================================================
    // TopNav
    // ============================================================
    function TopNav({ active, onChange }) {
      return (
        <nav style={{
          position: 'fixed', top: 0, left: 0, right: 0, height: 56,
          background: 'rgba(250,250,248,0.92)', backdropFilter: 'blur(12px)',
          borderBottom: `1px solid ${t.rule}`, display: 'flex', alignItems: 'center',
          padding: '0 40px', zIndex: 100, gap: 32,
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <div style={{ width: 28, height: 28, background: t.primary, borderRadius: 6, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            </div>
            <span style={{ fontSize: 15, fontWeight: 700, color: t.ink, letterSpacing: '-0.02em' }}>AI小商</span>
          </div>

          <div style={{ display: 'flex', alignItems: 'center', gap: 4, marginLeft: 24 }}>
            {navItems.map(item => (
              <button key={item.key} onClick={() => onChange?.(item.key)} style={{
                display: 'flex', alignItems: 'center', gap: 6, padding: '6px 14px',
                borderRadius: 8, border: 'none', cursor: 'pointer', fontSize: 13,
                fontWeight: active === item.key ? 600 : 400,
                background: active === item.key ? t.muted : 'transparent',
                color: active === item.key ? t.ink : t.inkLight,
                transition: 'all 0.15s',
              }}>
                <span style={{ opacity: active === item.key ? 1 : 0.6 }}>{icons[item.icon]}</span>
                {item.label}
              </button>
            ))}
          </div>

          <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 12 }}>
            <div style={{ width: 32, height: 32, borderRadius: '50%', background: `linear-gradient(135deg, ${t.primary}, ${t.primaryLight})`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <span style={{ fontSize: 14, color: '#fff' }}>林</span>
            </div>
          </div>
        </nav>
      );
    }

    // ============================================================
    // Sidebar (for some pages)
    // ============================================================
    function Sidebar({ items, active, onChange }) {
      return (
        <div style={{
          width: 200, flexShrink: 0, borderRight: `1px solid ${t.rule}`,
          padding: '24px 0', display: 'flex', flexDirection: 'column', gap: 2,
        }}>
          {items.map(item => (
            <button key={item.key} onClick={() => onChange?.(item.key)} style={{
              display: 'flex', alignItems: 'center', gap: 10, padding: '10px 20px',
              border: 'none', cursor: 'pointer', fontSize: 13,
              fontWeight: active === item.key ? 600 : 400,
              background: active === item.key ? t.muted : 'transparent',
              color: active === item.key ? t.ink : t.inkLight,
              textAlign: 'left', borderRadius: 0, transition: 'all 0.15s',
              borderLeft: active === item.key ? `3px solid ${t.primary}` : '3px solid transparent',
            }}>
              {item.label}
            </button>
          ))}
        </div>
      );
    }

    // ============================================================
    // Home Page — editorial newspaper layout
    // ============================================================
    function HomePage() {
      return (
        <div style={{ display: 'flex', minHeight: '100vh', paddingTop: 56 }}>
          {/* Main Content */}
          <div style={{ flex: 1, padding: '40px 48px', maxWidth: 900 }}>
            {/* Greeting */}
            <div className="fade-up" style={{ marginBottom: 40 }}>
              <div style={{ fontSize: 12, fontWeight: 500, color: t.primary, letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 6 }}>Tuesday, April 24</div>
              <h1 style={{ fontSize: 32, fontWeight: 700, color: t.ink, letterSpacing: '-0.03em', lineHeight: 1.2 }}>
                你好，林同学<br/>
                <span style={{ fontWeight: 400, color: t.inkFaint }}>今日有 3 节课程</span>
              </h1>
            </div>

            {/* Courses */}
            <div className="fade-up" style={{ marginBottom: 40, animationDelay: '0.1s' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16 }}>
                <div style={{ width: 4, height: 20, background: t.primary, borderRadius: 2 }}/>
                <h2 style={{ fontSize: 14, fontWeight: 600, color: t.ink, letterSpacing: '0.02em' }}>今日课程</h2>
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 1, background: t.rule, borderRadius: 12, overflow: 'hidden', border: `1px solid ${t.rule}` }}>
                {todayCourses.map((course, i) => (
                  <div key={i} style={{
                    display: 'flex', alignItems: 'center', gap: 20, padding: '18px 24px',
                    background: t.card, transition: 'all 0.15s', cursor: 'pointer',
                  }}>
                    <div style={{ width: 4, height: 36, background: course.color, borderRadius: 2, flexShrink: 0 }}/>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 15, fontWeight: 600, color: t.ink }}>{course.name}</div>
                      <div style={{ fontSize: 13, color: t.inkLight, marginTop: 2 }}>{course.teacher}</div>
                    </div>
                    <div style={{ textAlign: 'right' }}>
                      <div style={{ fontSize: 13, fontWeight: 500, color: t.ink }}>{course.time}</div>
                      <div style={{ fontSize: 12, color: t.inkFaint, marginTop: 2 }}>{course.room}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Schedules */}
            <div className="fade-up" style={{ marginBottom: 40, animationDelay: '0.2s' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16 }}>
                <div style={{ width: 4, height: 20, background: t.accent, borderRadius: 2 }}/>
                <h2 style={{ fontSize: 14, fontWeight: 600, color: t.ink, letterSpacing: '0.02em' }}>近期日程</h2>
              </div>
              <div style={{ display: 'flex', gap: 12 }}>
                {schedules.map((s, i) => (
                  <div key={i} style={{
                    flex: 1, padding: '16px 20px', background: t.card,
                    borderRadius: 12, border: `1px solid ${t.rule}`, cursor: 'pointer',
                    transition: 'all 0.15s',
                  }}>
                    <div style={{ fontSize: 14, fontWeight: 600, color: t.ink, marginBottom: 4 }}>{s.title}</div>
                    <div style={{ fontSize: 12, color: t.inkFaint }}>{s.time}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Quick Actions */}
            <div className="fade-up" style={{ animationDelay: '0.3s' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16 }}>
                <div style={{ width: 4, height: 20, background: t.success, borderRadius: 2 }}/>
                <h2 style={{ fontSize: 14, fontWeight: 600, color: t.ink, letterSpacing: '0.02em' }}>快捷功能</h2>
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12 }}>
                {[
                  { label: '录音回顾', icon: '🎙', color: t.primary, desc: '课程录音转写与AI总结' },
                  { label: '智能翻译', icon: '🌐', color: t.accent, desc: '即时翻译与文档翻译' },
                  { label: '选课助手', icon: '📖', color: t.success, desc: 'AI推荐选课方案' },
                  { label: '校园活动', icon: '🎪', color: '#8B6914', desc: '活动策划与宣传文案' },
                ].map((item, i) => (
                  <div key={i} className="slide-in" style={{
                    padding: '20px 16px', background: t.card, borderRadius: 12,
                    border: `1px solid ${t.rule}`, cursor: 'pointer', transition: 'all 0.15s',
                    animationDelay: `${0.3 + i * 0.05}s`,
                  }}>
                    <div style={{ fontSize: 24, marginBottom: 10 }}>{item.icon}</div>
                    <div style={{ fontSize: 14, fontWeight: 600, color: t.ink, marginBottom: 4 }}>{item.label}</div>
                    <div style={{ fontSize: 12, color: t.inkFaint, lineHeight: 1.5 }}>{item.desc}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Right Sidebar */}
          <div style={{ width: 280, padding: '40px 32px', borderLeft: `1px solid ${t.rule}` }}>
            {/* Stats */}
            <div style={{ marginBottom: 32 }}>
              <h3 style={{ fontSize: 12, fontWeight: 600, color: t.inkFaint, letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 12 }}>学习数据</h3>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 1, background: t.rule, borderRadius: 12, overflow: 'hidden', border: `1px solid ${t.rule}` }}>
                {statsData.map((item, i) => (
                  <div key={i} style={{ padding: '16px', background: t.card, textAlign: 'center' }}>
                    <div style={{ fontSize: 22, fontWeight: 700, color: t.ink }}>{item.value}</div>
                    <div style={{ fontSize: 11, color: t.inkFaint, marginTop: 2 }}>{item.label}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Recent */}
            <div>
              <h3 style={{ fontSize: 12, fontWeight: 600, color: t.inkFaint, letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 12 }}>最近活动</h3>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 1 }}>
                {recentActivities.map((act, i) => (
                  <div key={i} style={{ padding: '12px 0', borderBottom: `1px solid ${t.rule}`, cursor: 'pointer' }}>
                    <div style={{ fontSize: 13, fontWeight: 500, color: t.ink, marginBottom: 2 }}>{act.title}</div>
                    <div style={{ fontSize: 11, color: t.inkFaint }}>{act.subtitle}</div>
                    <div style={{ fontSize: 10, color: t.inkFainter, marginTop: 2 }}>{act.time}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // AI Chat Page — split panel
    // ============================================================
    function ChatPage() {
      const [messages, setMessages] = useState(chatMessages);
      const [inputValue, setInputValue] = useState('');

      return (
        <div style={{ display: 'flex', height: '100vh', paddingTop: 56 }}>
          {/* Chat Area */}
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column' }}>
            {/* Header */}
            <div style={{
              padding: '20px 40px', borderBottom: `1px solid ${t.rule}`,
              display: 'flex', alignItems: 'center', gap: 16, background: t.paper,
            }}>
              <div style={{ width: 44, height: 44, borderRadius: '50%', background: `linear-gradient(135deg, ${t.primary}, ${t.primaryLight})`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                <span style={{ fontSize: 20 }}>🎓</span>
              </div>
              <div>
                <div style={{ fontSize: 15, fontWeight: 600, color: t.ink }}>AI学姐 · 智能对话</div>
                <div style={{ fontSize: 12, color: t.success }}>在线 · 基于星火大模型</div>
              </div>
            </div>

            {/* Messages */}
            <div style={{ flex: 1, overflow: 'auto', padding: '32px 48px', background: t.paper }}>
              <div style={{ maxWidth: 680, margin: '0 auto' }}>
                <div style={{
                  display: 'flex', gap: 16, padding: '20px 0', borderBottom: `1px solid ${t.rule}`, marginBottom: 8,
                }}>
                  <div style={{ width: 36, height: 36, borderRadius: '50%', background: `linear-gradient(135deg, ${t.primary}, ${t.primaryLight})`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                    <span style={{ fontSize: 16, color: '#fff' }}>🎓</span>
                  </div>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 600, color: t.primary, marginBottom: 8 }}>AI学姐</div>
                    <div style={{ fontSize: 15, color: t.ink, lineHeight: 1.7 }}>👋 林同学你好！我是AI学姐，有什么校园生活、学习问题都可以问我哦。今天想聊点什么？</div>
                  </div>
                </div>

                {messages.map((msg, i) => (
                  <div key={i} style={{ display: 'flex', gap: 16, padding: '20px 0', borderBottom: `1px solid ${t.rule}`, flexDirection: msg.role === 'user' ? 'row-reverse' : 'row' }}>
                    {msg.role === 'ai' ? (
                      <div style={{ width: 36, height: 36, borderRadius: '50%', background: `linear-gradient(135deg, ${t.primary}, ${t.primaryLight})`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                        <span style={{ fontSize: 16, color: '#fff' }}>🎓</span>
                      </div>
                    ) : (
                      <div style={{ width: 36, height: 36, borderRadius: '50%', background: t.muted, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                        <span style={{ fontSize: 14, color: t.inkLight }}>林</span>
                      </div>
                    )}
                    <div style={{ maxWidth: 520 }}>
                      <div style={{ fontSize: 12, fontWeight: 600, color: msg.role === 'ai' ? t.primary : t.inkFaint, marginBottom: 6, textAlign: msg.role === 'user' ? 'right' : 'left' }}>
                        {msg.role === 'ai' ? 'AI学姐' : mockUser.nickname}
                      </div>
                      <div style={{ fontSize: 15, color: t.ink, lineHeight: 1.7, textAlign: msg.role === 'user' ? 'right' : 'left' }}>
                        {msg.text}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Input */}
            <div style={{
              padding: '20px 48px', borderTop: `1px solid ${t.rule}`,
              background: t.card, display: 'flex', alignItems: 'center', gap: 12,
            }}>
              <button style={{ width: 40, height: 40, borderRadius: 10, border: `1px solid ${t.rule}`, background: t.card, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', color: t.inkLight, flexShrink: 0 }}>
                {icons.mic}
              </button>
              <input
                value={inputValue}
                onChange={e => setInputValue(e.target.value)}
                placeholder="输入你的问题..."
                style={{
                  flex: 1, height: 44, borderRadius: 10, border: `1px solid ${t.rule}`,
                  padding: '0 16px', fontSize: 14, outline: 'none', background: t.muted,
                  color: t.ink, fontFamily: 'inherit',
                }}
              />
              <button style={{
                height: 44, padding: '0 20px', borderRadius: 10, border: 'none',
                background: t.primary, color: '#fff', fontSize: 14, fontWeight: 500,
                cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 8,
              }}>
                {icons.send}
                <span>发送</span>
              </button>
            </div>
          </div>

          {/* Right Panel — context */}
          <div style={{ width: 260, borderLeft: `1px solid ${t.rule}`, padding: '24px 20px', background: t.muted }}>
            <h3 style={{ fontSize: 12, fontWeight: 600, color: t.inkFaint, letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 16 }}>快捷操作</h3>
            {[
              '查询课表', '复习重点', '制定计划', '咨询选课',
            ].map((item, i) => (
              <div key={i} style={{
                padding: '12px 14px', marginBottom: 8, borderRadius: 8,
                background: t.card, border: `1px solid ${t.rule}`, fontSize: 13,
                color: t.inkLight, cursor: 'pointer', transition: 'all 0.15s',
              }}>
                {item}
              </div>
            ))}
            <div style={{ marginTop: 24 }}>
              <h3 style={{ fontSize: 12, fontWeight: 600, color: t.inkFaint, letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 12 }}>学习助手</h3>
              <div style={{ padding: 14, borderRadius: 10, background: `${t.primary}10`, border: `1px solid ${t.primary}25`, fontSize: 12, color: t.primary, lineHeight: 1.6 }}>
                情感陪伴模式已开启<br/>
                <span style={{ color: t.inkFaint, marginTop: 4, display: 'block' }}>点击 ❤️ 可切换模式</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // Translate Page
    // ============================================================
    function TranslatePage() {
      const [inputText, setInputText] = useState('');
      const [outputText, setOutputText] = useState('');
      const [fromLang, setFromLang] = useState('中文');
      const [toLang, setToLang] = useState('英文');

      const langs = ['中文', '英文', '日文', '韩文', '法文', '德文', '西班牙文'];

      return (
        <div style={{ display: 'flex', height: '100vh', paddingTop: 56 }}>
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column' }}>
            <div style={{ padding: '20px 40px', borderBottom: `1px solid ${t.rule}`, background: t.paper }}>
              <h2 style={{ fontSize: 18, fontWeight: 700, color: t.ink }}>智能翻译</h2>
              <p style={{ fontSize: 13, color: t.inkFaint, marginTop: 4 }}>支持即时翻译与文档翻译</p>
            </div>

            {/* Language Selector */}
            <div style={{ padding: '16px 48px', borderBottom: `1px solid ${t.rule}`, display: 'flex', alignItems: 'center', gap: 24, background: t.card }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <span style={{ fontSize: 13, color: t.inkFaint }}>源语言</span>
                <select value={fromLang} onChange={e => setFromLang(e.target.value)} style={{ padding: '6px 12px', borderRadius: 8, border: `1px solid ${t.rule}`, fontSize: 13, background: t.muted, color: t.ink, cursor: 'pointer' }}>
                  {langs.map(l => <option key={l}>{l}</option>)}
                </select>
              </div>
              <div style={{ color: t.inkFainter, fontSize: 16 }}>→</div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <span style={{ fontSize: 13, color: t.inkFaint }}>目标语言</span>
                <select value={toLang} onChange={e => setToLang(e.target.value)} style={{ padding: '6px 12px', borderRadius: 8, border: `1px solid ${t.rule}`, fontSize: 13, background: t.muted, color: t.ink, cursor: 'pointer' }}>
                  {langs.map(l => <option key={l}>{l}</option>)}
                </select>
              </div>
              <button style={{ marginLeft: 'auto', padding: '8px 20px', borderRadius: 10, border: 'none', background: t.primary, color: '#fff', fontSize: 13, fontWeight: 500, cursor: 'pointer' }}>
                翻译
              </button>
            </div>

            {/* Split Panel */}
            <div style={{ flex: 1, display: 'grid', gridTemplateColumns: '1fr 1fr', overflow: 'hidden' }}>
              {/* Input */}
              <div style={{ padding: '24px', borderRight: `1px solid ${t.rule}`, display: 'flex', flexDirection: 'column' }}>
                <div style={{ fontSize: 12, fontWeight: 600, color: t.inkFaint, letterSpacing: '0.06em', textTransform: 'uppercase', marginBottom: 12 }}>输入文本</div>
                <textarea
                  value={inputText}
                  onChange={e => setInputText(e.target.value)}
                  placeholder="在此输入需要翻译的文本..."
                  style={{
                    flex: 1, resize: 'none', border: `1px solid ${t.rule}`, borderRadius: 12,
                    padding: '16px', fontSize: 14, outline: 'none', background: t.muted,
                    color: t.ink, fontFamily: 'inherit', lineHeight: 1.7,
                  }}
                />
              </div>
              {/* Output */}
              <div style={{ padding: '24px', display: 'flex', flexDirection: 'column' }}>
                <div style={{ fontSize: 12, fontWeight: 600, color: t.inkFaint, letterSpacing: '0.06em', textTransform: 'uppercase', marginBottom: 12 }}>翻译结果</div>
                <textarea
                  value={outputText}
                  readOnly
                  placeholder="翻译结果将在这里显示..."
                  style={{
                    flex: 1, resize: 'none', border: `1px solid ${t.rule}`, borderRadius: 12,
                    padding: '16px', fontSize: 14, outline: 'none', background: t.card,
                    color: t.ink, fontFamily: 'inherit', lineHeight: 1.7,
                  }}
                />
              </div>
            </div>
          </div>
        </div>
      );
    }

                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 20 }}>

                      <option>低 <500元</option><option>中 500-2000元</option><option>高 >2000元</option>
                    </select>

                <button style={{ width: '100%', padding: '12px', borderRadius: 10, border: 'none', background: t.primary, color: '#fff', fontSize: 14, fontWeight: 600, cursor: 'pointer' }}>
                  生成策划方案

              {/* Right: Output Preview */}
              <div style={{ background: t.card, borderRadius: 14, border: `1px solid ${t.rule}`, padding: 24, minHeight: 300 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: t.inkFaint, marginBottom: 16 }}>策划方案预览</div>
                <div style={{ fontSize: 14, color: t.inkLight, lineHeight: 1.8, fontFamily: 'Georgia, serif' }}>
                  <p style={{ marginBottom: 12, color: t.inkFaint, fontSize: 12 }}>生成的策划方案将显示在这里...</p>
                  <p style={{ color: t.inkFaint, fontSize: 12 }}>填写左侧表单后点击「生成策划方案」按钮</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ============================================================

                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16 }}>

    // ============================================================
    // App Router
    // ============================================================
    function App() {
      const [screen, setScreen] = useState('home');

      const pages = {
        home: <HomePage />,
        ai: <ChatPage />,
        translate: <TranslatePage />,
        activity: <ActivityPage />,
        course: <CoursePage />,
      };

      return (
        <div style={{ minHeight: '100vh', background: t.paper }}>
          <TopNav active={screen} onChange={setScreen} />
          {pages[screen]}
        </div>
      );
    }

    // ============================================================
    // Render
    // ============================================================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
