<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学生首页 - 时间轴风格</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0891B2;
      --primary-light: #22D3EE;
      --bg-page: #F8FAFC;
      --bg-card: #FFFFFF;
      --bg-warm: #F1F5F9;
      --text-primary: #1E293B;
      --text-secondary: #64748B;
      --text-muted: #94A3B8;
      --border: #E2E8F0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 24px 80px;
    }

    /* 头部 */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .greeting-block {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .greeting-avatar {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      font-weight: 700;
    }

    .greeting-text .greeting {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .greeting-text .name {
      font-size: 20px;
      font-weight: 700;
    }

    .header-date {
      text-align: right;
    }

    .header-date .date {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .header-date .weekday {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* 全宽时间轴课程 */
    .today-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .today-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .today-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .today-title-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(8, 145, 178, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .today-title-icon svg {
      width: 20px;
      height: 20px;
      color: var(--primary);
    }

    .today-title-text {
      font-size: 16px;
      font-weight: 600;
    }

    .today-link {
      font-size: 13px;
      color: var(--primary);
      text-decoration: none;
    }

    .today-link:hover {
      text-decoration: underline;
    }

    /* 课程时间轴 */
    .timeline {
      position: relative;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 16px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, var(--primary), var(--primary-light), #8B5CF6, #059669);
      border-radius: 2px;
    }

    .course-item {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      padding: 16px 0;
      position: relative;
    }

    .course-item:not(:last-child) {
      border-bottom: 1px dashed var(--border);
    }

    .time-block {
      width: 70px;
      flex-shrink: 0;
      text-align: right;
      padding-top: 2px;
    }

    .time-start {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .time-slot {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .timeline-dot {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .course-item:nth-child(1) .timeline-dot { background: var(--primary); }
    .course-item:nth-child(2) .timeline-dot { background: #8B5CF6; }
    .course-item:nth-child(3) .timeline-dot { background: #059669; }

    .timeline-dot svg {
      width: 18px;
      height: 18px;
      color: white;
    }

    .course-info {
      flex: 1;
      background: var(--bg-warm);
      border-radius: 14px;
      padding: 16px 20px;
    }

    .course-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .course-meta {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .course-meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .course-meta-item svg {
      width: 12px;
      height: 12px;
    }

    .no-course {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    /* 快捷服务 - 横向滚动 */
    .quick-section {
      margin-bottom: 24px;
    }

    .quick-header {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 14px;
    }

    .quick-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .quick-card {
      min-width: 140px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 16px;
      text-align: center;
      flex-shrink: 0;
      cursor: pointer;
      transition: all 0.25s;
    }

    .quick-card:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(8, 145, 178, 0.1);
    }

    .quick-icon {
      width: 40px;
      height: 40px;
      margin: 0 auto 10px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .quick-icon svg {
      width: 20px;
      height: 20px;
    }

    .quick-card:nth-child(1) .quick-icon { background: rgba(8, 145, 178, 0.1); }
    .quick-card:nth-child(1) .quick-icon svg { color: var(--primary); }
    .quick-card:nth-child(2) .quick-icon { background: rgba(5, 150, 105, 0.1); }
    .quick-card:nth-child(2) .quick-icon svg { color: #059669; }
    .quick-card:nth-child(3) .quick-icon { background: rgba(139, 92, 246, 0.1); }
    .quick-card:nth-child(3) .quick-icon svg { color: #8B5CF6; }
    .quick-card:nth-child(4) .quick-icon { background: rgba(245, 158, 11, 0.1); }
    .quick-card:nth-child(4) .quick-icon svg { color: #F59E0B; }
    .quick-card:nth-child(5) .quick-icon { background: rgba(8, 145, 178, 0.1); }
    .quick-card:nth-child(5) .quick-icon svg { color: var(--primary); }
    .quick-card:nth-child(6) .quick-icon { background: rgba(236, 72, 153, 0.1); }
    .quick-card:nth-child(6) .quick-icon svg { color: #EC4899; }

    .quick-name {
      font-size: 13px;
      font-weight: 600;
    }

    /* AI学姐 */
    .ai-card {
      background: linear-gradient(135deg, rgba(8, 145, 178, 0.06), rgba(34, 211, 238, 0.03));
      border: 1px solid rgba(8, 145, 178, 0.12);
      border-radius: 20px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .ai-avatar {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .ai-info {
      flex: 1;
    }

    .ai-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .ai-desc {
      font-size: 12px;
      color: var(--text-muted);
    }

    .ai-btn {
      padding: 10px 18px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="page">
    <!-- 头部 -->

      <div class="greeting-block">
        <div class="greeting-avatar">明</div>
        <div class="greeting-text">
          <div class="greeting">下午好</div>

        <div class="course-item">

            <div class="course-name">消费者行为分析</div>
            <div class="course-meta">
              <span class="course-meta-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
                  <circle cx="12" cy="10" r="3"/>
                </svg>
                9教302
              </span>
              <span class="course-meta-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="10"/>
                  <path d="M12 6v6l4 2"/>
                </svg>

              </span>
            </div>

        </div>

        <div class="course-item">
          <div class="time-block">
            <div class="time-start">14:00</div>
            <div class="time-slot">5-6节</div>
          </div>
          <div class="timeline-dot">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

      </div>
    </div>

    <!-- 快捷服务 -->

      <div class="quick-header">快捷服务</div>
      <div class="quick-scroll">
        <div class="quick-card">
          <div class="quick-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2"/>

</body>
