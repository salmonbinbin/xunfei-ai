<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学生首页 - 日历突出风格</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0891B2;
      --primary-light: #22D3EE;
      --bg-page: #F8FAFC;
      --bg-card: #FFFFFF;
      --bg-warm: #F1F5F9;
      --text-primary: #1E293B;
      --text-secondary: #64748B;
      --text-muted: #94A3B8;
      --border: #E2E8F0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 24px 80px;
    }

    /* 欢迎区 */
    .welcome {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .welcome-text .greeting {
      font-size: 13px;
      color: var(--primary);
      font-weight: 500;
      margin-bottom: 4px;
    }

    .welcome-text .title {
      font-size: 22px;
      font-weight: 700;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 16px;
    }

    /* 主布局：左侧课程 + 右侧快捷 */
    .main-layout {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 20px;
    }

    /* 今日课程大卡片 */
    .today-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
    }

    .date-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--bg-warm);
      border-radius: 8px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .date-badge svg {
      width: 14px;
      height: 14px;
      color: var(--primary);
    }

    /* 课程时间轴 */
    .timeline {
      display: flex;
      flex-direction: column;
      gap: 0;
      position: relative;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 59px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--border);
    }

    .course-item {
      display: flex;
      gap: 16px;
      padding: 12px 0;
      position: relative;
    }

    .course-time-col {
      width: 50px;
      text-align: right;
      flex-shrink: 0;
    }

    .course-time {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .course-slot {
      font-size: 11px;
      color: var(--text-muted);
    }

    .timeline-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--primary);
      flex-shrink: 0;
      position: relative;
      z-index: 1;
      margin-top: 4px;
    }

    .course-content {
      flex: 1;
      background: var(--bg-warm);
      border-radius: 12px;
      padding: 14px 16px;
      margin-left: 8px;
    }

    .course-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .course-location {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .course-location svg {
      width: 12px;
      height: 12px;
    }

    .no-course {
      text-align: center;
      padding: 32px;
      color: var(--text-muted);
    }

    /* 右侧快捷服务 */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .quick-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .quick-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .quick-item:hover {
      border-color: var(--primary);
      box-shadow: 0 4px 12px rgba(8, 145, 178, 0.1);
    }

    .quick-icon {
      width: 36px;
      height: 36px;
      margin: 0 auto 8px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .quick-icon svg {
      width: 18px;
      height: 18px;
    }

    .quick-item:nth-child(1) .quick-icon { background: rgba(8, 145, 178, 0.1); }
    .quick-item:nth-child(1) .quick-icon svg { color: var(--primary); }
    .quick-item:nth-child(2) .quick-icon { background: rgba(5, 150, 105, 0.1); }
    .quick-item:nth-child(2) .quick-icon svg { color: #059669; }
    .quick-item:nth-child(3) .quick-icon { background: rgba(139, 92, 246, 0.1); }
    .quick-item:nth-child(3) .quick-icon svg { color: #8B5CF6; }
    .quick-item:nth-child(4) .quick-icon { background: rgba(245, 158, 11, 0.1); }
    .quick-item:nth-child(4) .quick-icon svg { color: #F59E0B; }

    .quick-label {
      font-size: 11px;
      color: var(--text-secondary);
    }

    /* AI学姐入口 */
    .ai-card {
      background: linear-gradient(135deg, rgba(8, 145, 178, 0.08), rgba(34, 211, 238, 0.04));
      border: 1px solid rgba(8, 145, 178, 0.15);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .ai-avatar {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      flex-shrink: 0;
    }

    .ai-text {
      flex: 1;
    }

    .ai-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .ai-desc {
      font-size: 11px;
      color: var(--text-muted);
    }

    .ai-btn {
      padding: 8px 12px;
      background: var(--primary);
      color: white;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }

    @media (max-width: 768px) {
      .main-layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <!-- 欢迎区 -->
    <div class="welcome">
      <div class="welcome-text">
        <p class="greeting">下午好</p>
        <h1 class="title">小明同学</h1>
      </div>
      <div class="avatar">明</div>
    </div>

    <!-- 主布局 -->
    <div class="main-layout">
      <!-- 左侧：今日课程 -->
      <div class="today-section">
        <div class="section-header">
          <h2 class="section-title">今日课程</h2>
          <div class="date-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <span>5月8日 周五</span>
          </div>
        </div>

        <div class="timeline">
          <div class="course-item">
            <div class="course-time-col">
              <div class="course-time">09:00</div>
              <div class="course-slot">1-2节</div>
            </div>
            <div class="timeline-dot"></div>
            <div class="course-content">
              <div class="course-name">市场营销</div>
              <div class="course-location">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
                  <circle cx="12" cy="10" r="3"/>
                </svg>
                9教301
              </div>
            </div>
          </div>

          <div class="course-item">
            <div class="course-time-col">
              <div class="course-time">10:00</div>
              <div class="course-slot">3-4节</div>
            </div>
            <div class="timeline-dot" style="background: #8B5CF6;"></div>
            <div class="course-content">
              <div class="course-name">消费者行为分析</div>
              <div class="course-location">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
                  <circle cx="12" cy="10" r="3"/>
                </svg>
                9教302
              </div>
            </div>
          </div>

          <div class="course-item">
            <div class="course-time-col">
              <div class="course-time">14:00</div>
              <div class="course-slot">5-6节</div>
            </div>
            <div class="timeline-dot" style="background: #059669;"></div>
            <div class="course-content">
              <div class="course-name">管理学原理</div>
              <div class="course-location">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
                  <circle cx="12" cy="10" r="3"/>
                </svg>
                8教201
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 右侧：快捷服务 -->
      <div class="sidebar">
        <div class="quick-title">快捷服务</div>
        <div class="quick-grid">
          <div class="quick-item">
            <div class="quick-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
              </svg>
            </div>
            <div class="quick-label">AI学姐</div>
          </div>
          <div class="quick-item">
            <div class="quick-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
                <path d="M19 10v2a7 7 0 01-14 0v-2"/>
              </svg>
            </div>
            <div class="quick-label">录音回顾</div>
          </div>
          <div class="quick-item">
            <div class="quick-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
              </svg>
            </div>
            <div class="quick-label">选课助手</div>
          </div>
          <div class="quick-item">
            <div class="quick-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
            </div>
            <div class="quick-label">智能翻译</div>
          </div>
        </div>

        <!-- AI学姐入口 -->
        <div class="ai-card">
          <div class="ai-avatar">AI</div>
          <div class="ai-text">
            <div class="ai-title">问问AI学姐</div>
            <div class="ai-desc">查课表、问选课...</div>
          </div>
          <button class="ai-btn">开始</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
