<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI小商教师端</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0891B2;
      --primary-light: #22D3EE;
      --primary-dark: #0E7490;
      --bg-page: #F8FAFC;
      --bg-card: #FFFFFF;
      --bg-warm: #F1F5F9;
      --text-primary: #1E293B;
      --text-secondary: #475569;
      --text-muted: #94A3B8;
      --border: #E2E8F0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 40px 120px;
    }

    /* 头部 */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 48px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(8, 145, 178, 0.25);
    }

    .brand-icon svg {
      width: 26px;
      height: 26px;
      color: white;
    }

    .brand-text {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px 8px 8px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      font-weight: 600;
    }

    .user-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }

    /* 问候区 */
    .greeting-block {
      margin-bottom: 48px;
    }

    .greeting-date {
      font-size: 13px;
      color: var(--primary);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .greeting-title {
      font-size: 32px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.3;
      margin-bottom: 12px;
    }

    .greeting-subtitle {
      font-size: 15px;
      color: var(--text-secondary);
      max-width: 520px;
      line-height: 1.6;
    }

    /* 功能模块标题 */
    .section-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* 功能模块卡片 */
    .modules-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 48px;
    }

    .module-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .module-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .card-grade::before { background: linear-gradient(90deg, var(--primary), var(--primary-light)); }
    .card-notification::before { background: linear-gradient(90deg, #8B5CF6, #A78BFA); }
    .card-lesson::before { background: linear-gradient(90deg, #059669, #34D399); }

    .module-card:hover::before {
      opacity: 1;
    }

    .module-card:hover {
      border-color: var(--primary);
      box-shadow: 0 8px 24px rgba(8, 145, 178, 0.1);
      transform: translateY(-2px);
    }

    .module-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .card-grade .module-icon {
      background: rgba(8, 145, 178, 0.1);
    }
    .card-grade .module-icon svg { color: var(--primary); }

    .card-notification .module-icon {
      background: rgba(139, 92, 246, 0.1);
    }
    .card-notification .module-icon svg { color: #8B5CF6; }

    .card-lesson .module-icon {
      background: rgba(5, 150, 105, 0.1);
    }
    .card-lesson .module-icon svg { color: #059669; }

    .module-icon svg {
      width: 26px;
      height: 26px;
    }

    .module-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .module-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .module-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .module-tag {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 6px;
      background: var(--bg-warm);
      color: var(--text-secondary);
    }

    /* 底部引言 */
    .quote-section {
      background: rgba(8, 145, 178, 0.04);
      border: 1px solid rgba(8, 145, 178, 0.12);
      border-radius: 16px;
      padding: 32px 40px;
      text-align: center;
      position: relative;
    }

    .quote-text {
      font-size: 17px;
      color: var(--text-primary);
      line-height: 1.8;
      font-style: italic;
      margin-bottom: 12px;
    }

    .quote-author {
      font-size: 13px;
      color: var(--primary);
      font-weight: 500;
    }

    .quote-refresh {
      position: absolute;
      bottom: 14px;
      right: 16px;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: rgba(8, 145, 178, 0.08);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .quote-refresh:hover {
      background: rgba(8, 145, 178, 0.15);
    }

    .quote-refresh svg {
      width: 14px;
      height: 14px;
      color: var(--primary);
    }

    /* 响应式 */
    @media (max-width: 900px) {
      .modules-grid {
        grid-template-columns: 1fr;
      }
      .page {
        padding: 32px 20px 100px;
      }
      .greeting-title {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <!-- 头部 -->
    <header class="header">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 14l9-5-9-5-9 5 9 5z"/>
            <path d="M12 14l6.16-3.42a12.08 12.08 0 01.65 6.42l-6.81 4 6.16 3.42L12 21l-6.16-3.42L5.03 17l6.81-4-.65 6.42L12 14z"/>
          </svg>
        </div>
        <span class="brand-text">AI小商</span>
      </div>

      <div class="user-info">
        <div class="user-avatar">张</div>
        <span class="user-name">张老师</span>
      </div>
    </header>

    <!-- 主内容 -->
    <main class="main-section">
      <!-- 问候语 -->
      <div class="greeting-block">
        <p class="greeting-date">2026年5月8日 · 周五</p>
        <h1 class="greeting-title">欢迎回来，张老师<br>让教学更智能</h1>
        <p class="greeting-subtitle">选择下方功能模块，开启您的智能教学之旅。AI将协助您完成成绩分析、通知发布、教案生成等工作。</p>
      </div>

      <!-- 功能模块标题 -->
      <h2 class="section-title">教学功能</h2>

      <!-- 功能模块卡片 -->
      <div class="modules-grid">
        <!-- 成绩管理 -->
        <div class="module-card card-grade">
          <div class="module-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
            </svg>
          </div>
          <h3 class="module-title">成绩管理</h3>
          <p class="module-desc">上传学生成绩表，AI智能分析成绩分布，生成统计图表与教学建议报告</p>
          <div class="module-tags">
            <span class="module-tag">智能分析</span>
            <span class="module-tag">可视化</span>
            <span class="module-tag">导出</span>
          </div>
        </div>

        <!-- 通知发布 -->
        <div class="module-card card-notification">
          <div class="module-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
          </div>
          <h3 class="module-title">通知发布</h3>
          <p class="module-desc">输入通知要点，AI生成格式规范的通知文档，支持一键推送到飞书群</p>
          <div class="module-tags">
            <span class="module-tag">AI生成</span>
            <span class="module-tag">格式规范</span>
            <span class="module-tag">飞书推送</span>
          </div>
        </div>

        <!-- 备课教案 -->
        <div class="module-card card-lesson">
          <div class="module-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
            </svg>
          </div>
          <h3 class="module-title">备课教案</h3>
          <p class="module-desc">描述课程知识点，AI生成结构化教学大纲与精美PPT演示文稿</p>
          <div class="module-tags">
            <span class="module-tag">AI大纲</span>
            <span class="module-tag">PPT</span>
            <span class="module-tag">教学建议</span>
          </div>
        </div>
      </div>
    </main>

    <!-- 底部引言 -->
    <section class="quote-section">
      <p class="quote-text" id="quoteText">教育不是注满一桶水，而是点燃一把火。</p>
      <p class="quote-author" id="quoteAuthor">威廉·巴赫·叶芝</p>
      <button class="quote-refresh" onclick="refreshQuote()" title="换一句">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
      </button>
    </section>
  </div>

  <script>
    const quotes = [
      { text: "教育不是注满一桶水，而是点燃一把火。", author: "威廉·巴赫·叶芝" },
      { text: "教育的本质是一棵树摇动另一棵树，一朵云推动另一朵云，一个灵魂唤醒另一个灵魂。", author: "卡尔·雅斯贝尔斯" },
      { text: "教而不研则浅，研而不教则空。", author: "陶行知" },
      { text: "捧着一颗心来，不带半根草去。", author: "陶行知" },
      { text: "教师是人类灵魂的工程师。", author: "米哈伊尔·加里宁" },
      { text: "教学的艺术不在于传授本领，而在于激励、唤醒和鼓舞。", author: "第斯多惠" },
      { text: "没有爱就没有教育。", author: "陶行知" },
      { text: "真教育是心心相印的活动，唯独从心里发出来，才能打动心灵的深处。", author: "陶行知" },
      { text: "千教万教教人求真，千学万学学做真人。", author: "陶行知" },
      { text: "先生不应该专教书，他的责任是教人做人。", author: "陶行知" },
      { text: "好的先生不是教书，不是教学生，乃是教学生学。", author: "陶行知" },
      { text: "教育是什么？就单方面讲，需一句话，就是养成良好的习惯。", author: "叶圣陶" },
      { text: "教是为了不需要教。", author: "叶圣陶" },
      { text: "师者，所以传道受业解惑也。", author: "韩愈" },
      { text: "师者，人之模范也。", author: "扬雄" },
      { text: "古之学者必严其师，师严然后道尊。", author: "欧阳修" },
      { text: "教育植根于爱。", author: "鲁迅" },
      { text: "学而不思则罔，思而不学则殆。", author: "孔子" },
      { text: "知之者不如好之者，好之者不如乐之者。", author: "孔子" },
      { text: "三人行，必有我师焉。择其善者而从之，其不善者而改之。", author: "孔子" },
      { text: "学而时习之，不亦说乎？", author: "孔子" },
      { text: "温故而知新，可以为师矣。", author: "孔子" },
      { text: "不愤不启，不悱不发。举一隅不以三隅反，则不复也。", author: "孔子" },
      { text: "智仁勇三者是中国重要的精神遗产。", author: "蔡元培" },
      { text: "知教育者，与其守成法，毋宁尚自然。", author: "蔡元培" },
      { text: "教师是太阳底下最光辉的职业。", author: "夸美纽斯" },
      { text: "读书破万卷，下笔如有神。", author: "杜甫" },
      { text: "凡人学习之所以伟大，全在学习后之成就。", author: "顾明远" },
      { text: "教育者，养成人格之事业也。", author: "蔡元培" },
      { text: "活得的人才教育不是灌输知识，而是将开发文化宝库的钥匙交给学生。", author: "陶行知" }
    ];

    let lastIndex = -1;

    function getRandomQuote() {
      let newIndex;
      do {
        newIndex = Math.floor(Math.random() * quotes.length);
      } while (newIndex === lastIndex && quotes.length > 1);

      lastIndex = newIndex;
      return quotes[newIndex];
    }

    function refreshQuote() {
      const quote = getRandomQuote();
      const textEl = document.getElementById('quoteText');
      const authorEl = document.getElementById('quoteAuthor');

      textEl.style.opacity = 0;
      authorEl.style.opacity = 0;

      setTimeout(() => {
        textEl.textContent = quote.text;
        authorEl.textContent = quote.author;
        textEl.style.opacity = 1;
        authorEl.style.opacity = 1;
      }, 200);
    }

    document.addEventListener('DOMContentLoaded', function() {
      const quote = getRandomQuote();
      document.getElementById('quoteText').textContent = quote.text;
      document.getElementById('quoteAuthor').textContent = quote.author;

      document.getElementById('quoteText').style.transition = 'opacity 0.2s ease';
      document.getElementById('quoteAuthor').style.transition = 'opacity 0.2s ease';
    });
  </script>
</body>
</html>
